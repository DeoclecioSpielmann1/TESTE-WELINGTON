<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .passou  { color: green; }
        .falhou  { color: red; }
        #testes-unitarios, #testes-componentes { margin-top: 10px; }
        h3 { margin-bottom: 6px; }
    </style>
</head>
<body>
    <input id="input1" type="text" placeholder="Número 1">
    <input id="input2" type="text" placeholder="Número 2">
    <button onclick="somar()">Somar</button>
    <button onclick="subtrair()">Subtrair</button>
    <button onclick="multiplicar()">Multiplicar</button>
    <button onclick="dividir()">Dividir</button>
    <div id="soma"></div>

    <hr>
    <button onclick="rodarTestes()">Executar Testes Unitários</button>
    <button onclick="rodarTestesComponent()">Executar Testes Component</button>

    <div id="testes-unitarios"></div>
    <div id="testes-componentes"></div>

    <script>
        function somar() {
            const num1 = parseFloat(document.getElementById("input1").value);
            const num2 = parseFloat(document.getElementById("input2").value);
            const resultado = num1 + num2;
            document.getElementById("soma").textContent = "Resultado: " + (num1 + num2);
            limparInputs();
        }
        function subtrair() {
            const num1 = parseFloat(document.getElementById("input1").value);
            const num2 = parseFloat(document.getElementById("input2").value);
            const resultado = num1 - num2;
            document.getElementById("soma").textContent = "Resultado: " + (num1 - num2);
            limparInputs();
        }
        function multiplicar() {
            const num1 = parseFloat(document.getElementById("input1").value);
            const num2 = parseFloat(document.getElementById("input2").value);
            const resultado = num1 * num2;
            document.getElementById("soma").textContent = "Resultado: " + (num1 * num2);
            limparInputs();
        }
        function dividir() {
            const num1 = parseFloat(document.getElementById("input1").value);
            const num2 = parseFloat(document.getElementById("input2").value);
            const resultado = num1 / num2;
            if (num2 !== 0) {
                document.getElementById("soma").textContent = "Resultado: " + (num1 / num2);
            } else {
                document.getElementById("soma").textContent = "Erro: Divisão por zero!";
            }
            limparInputs();
        }

        function renderizarResultados(containerId, titulo, resultados) {
            const container = document.getElementById(containerId);
            const passou = resultados.filter(r => r.passou).length;
            const total  = resultados.length;
            let html = `<h3>${titulo}: ${passou}/${total} passaram</h3><ul>`;
            for (const r of resultados) {
                const cls = r.passou ? "passou" : "falhou";
                const icone = r.passou ? "✔" : "✘";
                html += `<li class="${cls}">${icone} ${r.descricao}</li>`;
            }
            html += "</ul>";
            container.innerHTML = html;
        }

        function rodarTestes() {
            const resultados = executarTestesUnitarios();
            renderizarResultados("testes-unitarios", "Testes Unitários", resultados);
            limparInputs();
        }

        function rodarTestesComponent() {
            const resultados = executarTestesComponent();
            renderizarResultados("testes-componentes", "Testes de Componente", resultados);
            limparInputs();
        }
    </script>

    <script src="testes/unitario.test.js"></script>
    <script src="testes/component.test.js"></script>
</body>
</html>
